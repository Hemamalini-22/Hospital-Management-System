{% extends 'base.html' %}
{% block content %}

<h2>Welcome {{ doctor.doctor_name }}</h2>
<div class="table-container" style="margin-top: 20px;">
<table>
    <thead>
        <tr>
           <th>Patient ID</th>
           <th>Name</th>
           <th>Age</th>
           <th>Disease</th>
        </tr>
    </thead>
    <tbody>
        {% for patient in patients %}
        <tr>
           <td>{{ patient.patient_id }}</td>
           <td>{{ patient.patient_name }}</td>
           <td>{{ patient.age }}</td>
           <td>{{ patient.disease }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

{% endblock %}
