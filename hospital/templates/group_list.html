{% extends 'base.html' %}
{% block content %}

<h2 class="page-title">
    Group List
</h2>

<a href="{% url 'group_add' %}">
    <button class="add-btn" style="margin-bottom: 24px;">
        + Add Group
    </button>
</a>

<div class="table-container">
<table>

<thead>

<tr>

<th>ID</th>

<th>Group Name</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for group in groups %}

<tr>

<td>{{ group.id }}</td>

<td>{{ group.name }}</td>

<td>

<a href="{% url 'group_edit' group.id %}">
<button class="edit-btn">
Edit
</button>
</a>

<a href="{% url 'group_delete' group.id %}" onclick="return confirm('Are you sure you want to delete this group?')">
<button class="delete-btn">
Delete
</button>
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>
</div>

{% endblock %}
