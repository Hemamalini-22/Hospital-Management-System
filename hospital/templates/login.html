{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Hospital Login</title>
    <link rel="stylesheet"
          href="{% static 'css/login.css' %}">
</head>
<body>
<div class="login-box">
    <h2>Hospital Management System</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >
        </div>
        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >
        </div>
        <button
            class="login-btn"
            type="submit">
            Login
        </button>
    </form>
    {% for message in messages %}
    <div class="error">
        {{ message }}
    </div>
    {% endfor %}
</div>
</body>
</html>
