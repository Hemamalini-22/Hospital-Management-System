{% extends 'base.html' %}
{% block content %}
<h2 class="page-title">
    {% if form.instance.pk %}
        Edit Patient
    {% else %}
        Add Patient
    {% endif %}
</h2>
<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label>Patient Name</label>
            {{ form.patient_name }}
        </div>
        <div class="form-group">
            <label>Age</label>
            {{ form.age }}
        </div>
        <div class="form-group">
            <label>Disease</label>
            {{ form.disease }}
        </div>
        <div class="form-group">
            <label>Doctor</label>
            {{ form.doctor }}
        </div>
        
        <div class="button-group">
            <button type="submit" class="save-btn">
                Save
            </button>
            <a href="{% url 'patient_list' %}" class="cancel-btn">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
